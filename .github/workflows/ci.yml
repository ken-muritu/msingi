name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (build + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Generate Prisma client
        run: pnpm db:generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/msingi_test

      - name: Lint
        run: pnpm lint
        working-directory: backend

      - name: Test
        run: pnpm exec jest --passWithNoTests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/msingi_test

      - name: Build
        run: pnpm build
        working-directory: backend

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Build
        run: pnpm build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

  # ─── E2E ──────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build app
        run: pnpm build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

      - name: Run E2E tests
        run: PLAYWRIGHT_BASE_URL=http://localhost:3000 pnpm exec playwright test --project=chromium
        working-directory: apps/web
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
