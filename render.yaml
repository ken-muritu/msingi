services:
  # ─── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: msingi-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: frankfurt
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: msingi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MPESA_ENV
        value: production
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://msingi-api.onrender.com/api/v1/payments/mpesa/callback
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Msingi <noreply@msingi.co.ke>
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: MEILISEARCH_HOST
        sync: false
      - key: MEILISEARCH_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: msingi-assets
      - key: STORAGE_PROVIDER
        value: r2
      - key: CORS_ORIGIN
        value: https://msingios.vercel.app

  # ─── Database ─────────────────────────────────────────────────────────────
databases:
  - name: msingi-db
    plan: starter
    databaseName: msingi
    user: msingi
